    <script>
        let Time = setInterval(10)
        var score = 0

        if (Time === 10){

</head>
<body>
    <h1 id = "placeholder"></h1>
    <script>
        document.addEventListener('keydown', (event) => {

                document.getElementById('placeholder').innerHTML = showTime
            }
